<div id="map"></div>
@if (!isModalOpen()) {
  <div class="map-location-center">
    <floating-button (click)="centerToUserLocation()">
      <app-icon name="map-arrow" size="size-medium" color="color-neutral-light" />
    </floating-button>
  </div>
}
<occurrence-preview-modal
  [modalId]="modalId"
  [marker]="selectedMarker()"
  (handleClose)="selectedMarker.set(null)"
/>
