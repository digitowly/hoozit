<div>
  light
  <toggle-button
    [isChecked]="isThemeToggleChecked()"
    (onChange)="toggleTheme()"
  />
  dark
  @if (isUserLoading()) {
    <p>loading</p>
  } @else if (!user()) {
    <p>No user logged in</p>
    <a href="http://localhost:8000/user/login/google">Login with Google</a>
  } @else {
    <p>{{ user()?.email }}</p>
    <p>{{ user()?.nickname }}</p>
    <p>{{ user()?.role }}</p>
    <p>{{ user()?.account_tier }}</p>
    <button (click)="logoutUser()">logout</button>
  }
</div>
