map $http_accept_language $lang {
    default en-US;
    ~*^de de;
    ~*^en en-US;
}

server {
    listen 80;
    resolver [fd12::10] valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    set $redirect_scheme $scheme;
    if ($http_x_forwarded_proto = "https") {
        set $redirect_scheme "https";
    }

    location = / {
        return 302 $redirect_scheme://$http_host/$lang/;
    }

    location /de/ {
        alias /usr/share/nginx/html/de/;
        # Fallback to shared assets for /de/assets/, /de/app-icons/, and /de/media/
        location ~* ^/de/(assets|app-icons|media)/(.*)$ {
            alias /usr/share/nginx/html/$1/$2;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        try_files $uri $uri/ /de/index.html;
    }

    location /en-US/ {
        alias /usr/share/nginx/html/en-US/;
        # Fallback to shared assets for /en-US/assets/, /en-US/app-icons/, and /en-US/media/
        location ~* ^/en-US/(assets|app-icons|media)/(.*)$ {
            alias /usr/share/nginx/html/$1/$2;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        try_files $uri $uri/ /en-US/index.html;
    }

    location /api/rango/ {
        rewrite ^/api/rango/(.*)$ /$1 break;
        proxy_pass http://rango.railway.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location /api/verdex/ {
        rewrite ^/api/verdex/(.*)$ /api/$1 break;
        proxy_pass http://verdex.railway.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        client_max_body_size 50m;
    }

    # Internal location for serving assets with correct headers and access
    location /_internal_static/ {
        internal;
        alias /usr/share/nginx/html/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve common assets from the root directory
    location ~* ^/(assets|app-icons|media)/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Redirect Service Worker and its config to the detected locale
    location ~* (ngsw\.json|ngsw-worker\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        rewrite ^/(.*)$ /_internal_static/$lang/$1 last;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webmanifest|woff|woff2|ttf|otf)$ {
        # Already handled by /_internal_static/ if rewritten,
        # but this block handles requests that reach it directly (e.g. /en-US/styles.css)
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
