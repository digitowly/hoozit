map $http_accept_language $lang {
    default en-US;
    ~*^de de;
    ~*^en en-US;
}

server {
    listen 80;
    resolver [fd12::10] valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    set $redirect_scheme $scheme;
    if ($http_x_forwarded_proto = "https") {
        set $redirect_scheme "https";
    }

    location = / {
        return 302 $redirect_scheme://$http_host/$lang/;
    }

    location /de/ {
        alias /usr/share/nginx/html/de/;
        try_files $uri $uri/ /de/index.html;
    }

    location /en-US/ {
        alias /usr/share/nginx/html/en-US/;
        try_files $uri $uri/ /en-US/index.html;
    }

    location /api/rango/ {
        rewrite ^/api/rango/(.*)$ /$1 break;
        proxy_pass http://rango.railway.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location /api/verdex/ {
        rewrite ^/api/verdex/(.*)$ /api/$1 break;
        proxy_pass http://verdex.railway.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Redirect root-level assets to the detected locale (e.g., /assets/... -> /en-US/assets/...)
    location ^~ /assets/ {
        rewrite ^/assets/(.*)$ /$lang/assets/$1 last;
    }

    # Redirect Service Worker and its config to the detected locale
    location ~* (ngsw\.json|ngsw-worker\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        rewrite ^/(.*)$ /$lang/$1 break;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webmanifest|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
